name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        # no pipe: Actions bash has no pipefail, a pipe would eat the exit code
        run: python -m unittest discover tests

  webapp:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webapp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: webapp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Production build
        run: npm run build

  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    strategy:
      matrix:
        # full plugin set and bare core must both stay green
        plugins: ["widgets,guard,call,telemetry", ""]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v3
      - name: Build
        run: ./gradlew assembleDebug "-Pcocoon.plugins=${{ matrix.plugins }}" --no-daemon
