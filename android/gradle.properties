android.useAndroidX=true
org.gradle.jvmargs=-Xmx2g

# ---- Cocoon deployment config (override in local.properties or -P flags) ----
# Base URL of your cocoon bridge API (no trailing slash)
cocoon.baseUrl=https://cocoon.example/bridge
# Home URL the WebView loads
cocoon.homeUrl=https://cocoon.example/
# localStorage namespace used by the webapp (token key = "<ns>_token")
cocoon.storageNs=cocoon
# Comma-separated page paths that force landscape + immersive mode (optional)
cocoon.landscapePages=

# Feature plugins to compile in. Remove entries you don't want:
#   widgets   - home-screen widgets (status/heart/reminder/tasks/quick/health/mailbox)
#   guard     - remote app lock + screen share
#   call      - full-screen incoming call UI
#   telemetry - battery/location/screen-time/Health Connect reporting
cocoon.plugins=widgets,guard,call,telemetry
